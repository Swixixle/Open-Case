name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile (syntax check)
        run: python -m compileall -q .

      - name: Verify documentation-aligned claims
        run: python scripts/verify_documentation.py

      - name: Pytest (min 201 passed via ci_pytest_floor.py; full suite ~344 locally)
        env:
          # Belt-and-suspenders with tests/conftest.py: APScheduler + TestClient can error if set too late.
          DISABLE_SCHEDULER: "1"
        run: python server/scripts/ci_pytest_floor.py

  client:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install & build (Vite production bundle)
        working-directory: client
        run: npm ci && npm run build
